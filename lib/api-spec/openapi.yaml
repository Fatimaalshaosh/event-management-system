openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Presidential Protocol & Events Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: events
    description: Events management
  - name: visits
    description: Official visits
  - name: tasks
    description: Tasks and approvals
  - name: risks
  - name: logistics
    description: Risk register
  - name: vips
    description: VIP guests management
  - name: dashboard
    description: Dashboard summary data
  - name: calendar
    description: Calendar entries
  - name: invitations
    description: Invitations and registrations
  - name: participants
    description: Event participants management
  - name: rsvp
    description: Public RSVP submission
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Dashboard KPI summary
      parameters:
        - name: budgetThreshold
          in: query
          description: >-
            Percentage of an event's estimated budget at which it begins to show
            a budget warning (50-100). Defaults to 90.
          schema:
            type: integer
            minimum: 50
            maximum: 100
      responses:
        "200":
          description: Summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all events
      parameters:
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events/{id}/readiness:
    get:
      operationId: getEventReadiness
      tags: [events]
      summary: Get event readiness breakdown
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event readiness categories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EventReadiness"

  /visits:
    get:
      operationId: listVisits
      tags: [visits]
      summary: List official visits
      responses:
        "200":
          description: List of visits
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Visit"
    post:
      operationId: createVisit
      tags: [visits]
      summary: Request official visit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VisitInput"
      responses:
        "201":
          description: Created visit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Visit"

  /tasks:
    get:
      operationId: listTasks
      tags: [tasks]
      summary: List tasks
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Task"
    post:
      operationId: createTask
      tags: [tasks]
      summary: Create task
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskInput"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"

  /tasks/{id}:
    patch:
      operationId: updateTask
      tags: [tasks]
      summary: Update task status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TaskUpdate"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
    delete:
      operationId: deleteTask
      tags: [tasks]
      summary: Delete task
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /approvals:
    get:
      operationId: listApprovals
      tags: [tasks]
      summary: List pending approvals
      responses:
        "200":
          description: List of approvals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Approval"

  /approvals/{id}:
    patch:
      operationId: updateApproval
      tags: [tasks]
      summary: Approve or reject
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalUpdate"
      responses:
        "200":
          description: Updated approval
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Approval"

  /vips:
    get:
      operationId: listVips
      tags: [vips]
      summary: List VIP guests
      responses:
        "200":
          description: List of VIPs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Vip"
    post:
      operationId: createVip
      tags: [vips]
      summary: Add VIP guest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VipInput"
      responses:
        "201":
          description: Created VIP
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Vip"

  /calendar:
    get:
      operationId: listCalendarEntries
      tags: [calendar]
      summary: List calendar entries
      parameters:
        - name: date
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Calendar entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CalendarEntry"

  /invitations:
    get:
      operationId: listInvitations
      tags: [invitations]
      summary: List invitations
      parameters:
        - name: eventId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of invitations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Invitation"
    post:
      operationId: createInvitation
      tags: [invitations]
      summary: Send invitation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationInput"
      responses:
        "201":
          description: Created invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"

  /invitations/{id}:
    patch:
      operationId: updateInvitation
      tags: [invitations]
      summary: Update an invitation (status, check-in, verification)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InvitationUpdate"
      responses:
        "200":
          description: Updated invitation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Invitation"

  /events/{id}/guests:
    get:
      operationId: listEventGuests
      tags: [invitations]
      summary: List delegation guests for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of guests
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Guest"

  /guests/{id}:
    patch:
      operationId: updateGuest
      tags: [invitations]
      summary: Update a guest (check-in, verification)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GuestUpdate"
      responses:
        "200":
          description: Updated guest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Guest"

  /events/{id}/participants:
    get:
      operationId: listEventParticipants
      tags: [participants]
      summary: List participants for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Participant"

  /participants:
    post:
      operationId: createParticipant
      tags: [participants]
      summary: Add a participant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParticipantInput"
      responses:
        "201":
          description: Created participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Participant"

  /participants/{id}:
    patch:
      operationId: updateParticipant
      tags: [participants]
      summary: Update a participant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParticipantUpdate"
      responses:
        "200":
          description: Updated participant
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Participant"
    delete:
      operationId: deleteParticipant
      tags: [participants]
      summary: Remove a participant
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /rsvp/{token}:
    get:
      operationId: getRsvp
      tags: [rsvp]
      summary: Public — fetch an invitation by secure token
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: RSVP view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RsvpView"
        "404":
          description: Not found
    post:
      operationId: submitRsvp
      tags: [rsvp]
      summary: Public — submit an RSVP response
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RsvpSubmit"
      responses:
        "200":
          description: Updated RSVP view
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RsvpView"

  /reports:
    get:
      operationId: listReports
      tags: [reports]
      summary: List generated reports (most recent first)
      responses:
        "200":
          description: List of reports
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Report"
    post:
      operationId: createReport
      tags: [reports]
      summary: Record a generated report
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReportInput"
      responses:
        "201":
          description: Created report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Report"

  /reports/logistics:
    get:
      operationId: getReportsLogistics
      tags: [reports]
      summary: Aggregated trip logistics totals scoped to a set of events
      parameters:
        - name: eventIds
          in: query
          required: false
          description: Comma-separated event ids to scope totals to. When omitted, totals cover all events.
          schema:
            type: string
      responses:
        "200":
          description: Logistics totals for the requested scope
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LogisticsTotals"

  /dashboard/profiles:
    get:
      operationId: listDashboardProfiles
      tags: [dashboard]
      summary: List dashboard profiles for an owner
      parameters:
        - name: ownerKey
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of dashboard profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DashboardProfile"
    post:
      operationId: createDashboardProfile
      tags: [dashboard]
      summary: Create a dashboard profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardProfileInput"
      responses:
        "201":
          description: Created dashboard profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardProfile"

  /dashboard/profiles/{id}:
    patch:
      operationId: updateDashboardProfile
      tags: [dashboard]
      summary: Update a dashboard profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: ownerKey
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DashboardProfileUpdate"
      responses:
        "200":
          description: Updated dashboard profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardProfile"
    delete:
      operationId: deleteDashboardProfile
      tags: [dashboard]
      summary: Delete a dashboard profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: ownerKey
          in: query
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /dashboard/preferences:
    get:
      operationId: getUserPreferences
      tags: [dashboard]
      summary: Get an officer's saved preferences
      parameters:
        - name: ownerKey
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The officer's preferences (defaults applied when unset)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"
    put:
      operationId: updateUserPreferences
      tags: [dashboard]
      summary: Create or update an officer's preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserPreferencesInput"
      responses:
        "200":
          description: Saved preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPreferences"

  /dashboard/notifications:
    get:
      operationId: listNotifications
      tags: [dashboard]
      summary: Sync budget transitions and list notifications for an owner
      description: >-
        Evaluates the current per-event budget state, creates notifications for
        any events that have escalated into an "approaching" or "over" budget
        state since the last evaluation (deduplicated), then returns the
        notification feed for the owner.
      parameters:
        - name: ownerKey
          in: query
          required: true
          schema:
            type: string
        - name: budgetThreshold
          in: query
          description: >-
            Percentage of an event's estimated budget at which it begins to show
            a budget warning (50-100). Defaults to 90.
          schema:
            type: integer
            minimum: 50
            maximum: 100
      responses:
        "200":
          description: Notification feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"
    post:
      operationId: markAllNotificationsRead
      tags: [dashboard]
      summary: Mark all of an owner's notifications as read
      parameters:
        - name: ownerKey
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated notification feed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"

  /dashboard/notifications/{id}/read:
    patch:
      operationId: markNotificationRead
      tags: [dashboard]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: ownerKey
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated notification
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification"

  /events/{id}/risks:
    get:
      operationId: listEventRisks
      tags: [risks]
      summary: List risks for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of risks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Risk"

  /risks:
    post:
      operationId: createRisk
      tags: [risks]
      summary: Create a risk
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskInput"
      responses:
        "201":
          description: Created risk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Risk"

  /risks/{id}:
    patch:
      operationId: updateRisk
      tags: [risks]
      summary: Update a risk
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiskUpdate"
      responses:
        "200":
          description: Updated risk
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Risk"
    delete:
      operationId: deleteRisk
      tags: [risks]
      summary: Delete a risk
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events/{id}/ops-room:
    get:
      operationId: getEventOpsRoom
      tags: [events]
      summary: Aggregated live operations snapshot for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Live operations snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OpsRoom"

  /events/{id}/travel:
    get:
      operationId: listEventTravel
      tags: [logistics]
      summary: List Travel for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of Travel
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Travel"

  /travel:
    post:
      operationId: createTravel
      tags: [logistics]
      summary: Create a Travel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelInput"
      responses:
        "201":
          description: Created Travel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Travel"

  /travel/{id}:
    patch:
      operationId: updateTravel
      tags: [logistics]
      summary: Update a Travel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TravelUpdate"
      responses:
        "200":
          description: Updated Travel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Travel"
    delete:
      operationId: deleteTravel
      tags: [logistics]
      summary: Delete a Travel
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /travel-providers:
    get:
      operationId: listTravelProviders
      tags: [logistics]
      summary: List available travel booking providers
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TravelProvider"

  /flights/search:
    post:
      operationId: searchFlights
      tags: [logistics]
      summary: Search flight offers from a travel provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlightSearchRequest"
      responses:
        "200":
          description: Flight search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlightSearchResult"

  /flights/book:
    post:
      operationId: bookFlight
      tags: [logistics]
      summary: Book a selected flight offer and persist it as a Travel record
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FlightBookingRequest"
      responses:
        "201":
          description: Created flight booking (one or two travel legs)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FlightBookingResult"

  /events/{id}/travel-dashboard:
    get:
      operationId: getEventTravelDashboard
      tags: [logistics]
      summary: Travel dashboard summary for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Travel dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TravelDashboard"

  /events/{id}/hotel-bookings:
    get:
      operationId: listEventHotelBookings
      tags: [logistics]
      summary: List HotelBooking for an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of HotelBooking
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HotelBooking"

  /hotel-providers:
    get:
      operationId: listHotelProviders
      tags: [logistics]
      summary: List available hotel booking providers
      responses:
        "200":
          description: List of providers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HotelProvider"

  /hotels/search:
    post:
      operationId: searchHotels
      tags: [logistics]
      summary: Search hotel offers from a hotel provider
      requestBody:
        required: true
        content:
          application/json:
            schema:
