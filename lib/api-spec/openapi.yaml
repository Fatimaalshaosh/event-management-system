    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /events/{eventId}/documents/{docId}/file:
    get:
      tags: [logistics]
      operationId: downloadDocumentFile
      summary: Download an uploaded document file (event-scoped)
      description: |
        Streams the file attached to a logistics document. Retrieval is verified
        against the owning event and document, so private uploads are not globally
        reachable by their object key.
      parameters:
        - name: eventId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the event that owns the document.
        - name: docId
          in: path
          required: true
          schema:
            type: integer
          description: ID of the document whose file should be served.
      responses:
        '200':
          description: File content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Document, event, or file not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve document file.
          content:
